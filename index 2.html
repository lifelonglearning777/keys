<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#161B24">
<title>KEYS | 基本文タイピング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&family=BIZ+UDPGothic:wght@400;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --table:#161B24; --table-2:#1E2632; --table-3:#28303E;
  --grid:rgba(120,150,200,.06);
  --on:#E9EEF5; --on-soft:#9AA7B8; --on-dim:#6B7789;
  --paper:#FCFCFA; --paper-2:#F3F4EF;
  --ink:#14181F; --ink-soft:#59616E; --rule:#E1E4DC;
  --blue:#2E6BFF; --blue-2:#5C8BFF; --blue-soft:#EAF0FF; --blue-ink:#1B3E99;
  --red:#FF4D3D; --red-soft:#FFE9E6;
  --gold:#E4A11B; --gold-2:#F5C64F; --gold-soft:#FBF3DC; --gold-ink:#8A6008;
  --ok:#1FA971; --ok-soft:#EAF7F0;
  --warn:#C3893B; --warn-soft:#FBF1E2;
  --r:14px;
  --fs:16px;
  --lh:1.6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:var(--fs);-webkit-text-size-adjust:100%}
body{
  font-family:"BIZ UDPGothic","Andika",system-ui,sans-serif;
  color:var(--on); line-height:var(--lh); min-height:100vh;
  background:
    linear-gradient(var(--grid) 1px,transparent 1px) 0 0/28px 28px,
    linear-gradient(90deg,var(--grid) 1px,transparent 1px) 0 0/28px 28px,
    radial-gradient(1200px 600px at 80% -10%,#20293A 0,var(--table) 60%);
  background-color:var(--table);
}
body.reduce-motion *{animation:none!important;transition:none!important}
.mono{font-family:"Space Mono",ui-monospace,monospace}
.en{font-family:"Andika","BIZ UDPGothic",sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
textarea,input,select{font-family:inherit;font-size:1rem;color:var(--ink)}
svg{display:block}
:focus-visible{outline:2.5px solid var(--blue-2);outline-offset:3px;border-radius:6px}
::selection{background:rgba(46,107,255,.32)}
.sheet ::selection,.pv-doc ::selection{background:rgba(46,107,255,.22)}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:6px;border:3px solid var(--table)}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.28)}
button{cursor:pointer}
button:disabled{cursor:default}
.eyebrow{font-family:"Space Mono",monospace;font-size:.66rem;letter-spacing:.22em;text-transform:uppercase}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

/* ===== header ===== */
header{position:relative;border-bottom:1px solid rgba(255,255,255,.08)}
.head-in{max-width:980px;margin:0 auto;padding:.85rem 1.15rem .6rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:.6rem}
.wordmark{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:1.55rem;letter-spacing:.14em;color:var(--on)}
.wordmark .dot{color:var(--gold-2)}
.brand .sub{font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.2em;color:var(--on-dim);text-transform:uppercase}
.status{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap}
.key-chip{display:flex;align-items:center;gap:.45rem;padding:.34rem .7rem;border:1px solid rgba(228,161,27,.45);
  border-radius:999px;background:rgba(228,161,27,.08)}
.key-chip svg{width:14px;height:14px;color:var(--gold-2)}
.key-chip b{font-family:"Space Mono",monospace;font-size:.78rem;color:var(--gold-2)}
.key-chip span{font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.12em;color:var(--on-dim);text-transform:uppercase}
.streak-chip{display:flex;align-items:center;gap:.35rem;color:var(--on-soft);font-family:"Space Mono",monospace;font-size:.78rem}
.streak-chip.live{color:var(--red)}
.streak-chip svg{width:15px;height:15px}
nav{display:flex;gap:.3rem;margin-left:.2rem;flex-wrap:wrap}
nav button{font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.38rem .7rem;border-radius:8px;color:var(--on-soft)}
nav button:hover{color:var(--on);background:rgba(255,255,255,.05)}
nav button.on{color:var(--table);background:var(--on)}
.xp-strip{max-width:980px;margin:0 auto;padding:.15rem 1.15rem .7rem;display:flex;align-items:center;gap:.7rem}
.xp-bar{flex:1;height:5px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-2));border-radius:999px;width:0;transition:width .6s cubic-bezier(.2,.7,.2,1)}
.xp-label{font-family:"Space Mono",monospace;font-size:.66rem;letter-spacing:.08em;color:var(--on-dim);white-space:nowrap}

/* ===== layout ===== */
main{max-width:980px;margin:0 auto;padding:.7rem 1.15rem 3rem}
h2.sec{font-family:"Space Mono",monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--on-soft);
  margin:.85rem 0 .45rem;display:flex;align-items:center;gap:.6rem}
h2.sec::before{content:"";width:22px;height:1px;background:var(--on-dim)}
h2.sec.ja{font-family:"BIZ UDPGothic",sans-serif;font-size:.92rem;font-weight:700;letter-spacing:.3em;text-transform:none;color:var(--on)}

/* coach note */
.coach{display:flex;gap:.6rem;align-items:center;margin:.15rem 0 .5rem;border-left:2px solid var(--gold);padding:.15rem 0 .15rem .8rem}
.coach .avatar{width:34px;height:34px;flex:none;border-radius:9px;background:var(--table-2);
  border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:var(--gold-2)}
.coach .avatar svg{width:19px;height:19px}
.coach .c-label{font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--on-dim)}
.coach .c-msg{color:var(--on);font-size:.94rem;font-weight:500;margin-top:.05rem}

/* ===== paper sheet ===== */
.sheet{background:var(--paper);color:var(--ink);border-radius:var(--r);position:relative;
  box-shadow:0 1px 0 rgba(255,255,255,.04),0 18px 40px -22px rgba(0,0,0,.7);
  border:1px solid #E7E8E1;overflow:hidden}
.sheet::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--blue),var(--blue-2))}
.sheet.gold::before{background:linear-gradient(var(--gold),var(--gold-2))}
.sheet-label{position:absolute;top:.7rem;right:.9rem;font-family:"Space Mono",monospace;
  font-size:.62rem;letter-spacing:.14em;color:#A9AEA2;text-transform:uppercase}
.pad{padding:.75rem 1.1rem .8rem}

/* mission list */
.mission-row{display:flex;align-items:center;gap:.6rem;padding:.26rem 0;border-top:1px dashed var(--rule)}
.mission-row:first-of-type{border-top:none}
.mission-row .m-ic{width:20px;height:20px;flex:none;color:#C3C7BC}
.mission-row.done .m-ic{color:var(--ok)}
.mission-row span{font-size:.9rem;color:var(--ink)}
.mission-row.done span{color:var(--ink-soft);text-decoration:line-through}
.mission-note{font-family:"Space Mono",monospace;font-size:.64rem;color:var(--ok);margin-top:.4rem}
.mis-head{display:flex;align-items:center;justify-content:space-between}
.mis-keys{display:flex;gap:.25rem}
.tbox{border:1.5px dashed var(--gold);border-radius:12px;padding:.5rem .75rem;flex:none;
  display:flex;flex-direction:column;align-items:center;gap:.15rem;min-width:88px;background:#FFFDF6}
.tbox .t-dia{display:flex;gap:.28rem}
.tbox .t-dia i{font-style:normal;font-size:1.15rem;line-height:1;color:#E2DAC0}
.tbox .t-dia i.on{color:var(--gold)}
body:not(.reduce-motion) .tbox .t-dia i.on{animation:keypop .35s ease;display:inline-block}
.tbox .t-lab{font-family:"Space Mono",monospace;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-ink)}
.home-top{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;align-items:stretch}
.home-top .sheet{margin:0;display:flex;flex-direction:column}
.home-top .sheet .pad{display:flex;flex-direction:column;flex:1}

.home-side{display:flex;flex-direction:column;gap:.6rem;align-self:start}
.rc-head{font-family:"Space Mono",monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--on-soft);padding:.45rem .7rem .15rem}
.big-arw{margin-left:auto;color:var(--on-dim);font-size:1rem;transition:transform .15s}
.menu-big:hover .big-arw,.map-card:hover .big-arw{transform:translateX(3px);color:var(--on-soft)}
.map-card{display:flex;flex-direction:column;gap:.5rem;text-align:left;background:var(--table-2);
  border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:.85rem 1rem;cursor:pointer;
  transition:border-color .15s,transform .12s}
.map-card:hover{border-color:rgba(92,139,255,.55);transform:translateY(-1px)}
.mc-head{display:flex;align-items:center;gap:.6rem;width:100%}
.mc-head .mi{width:22px;height:22px;color:var(--blue-2);flex:none}
.mc-head b{font-size:1rem;color:var(--on)}
.mc-lv{display:flex;align-items:center;gap:.6rem;width:100%}
.mc-name{font-family:"Space Mono",monospace;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;
  color:var(--on-soft);flex:none;width:7.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-bar{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.09);overflow:hidden}
.mc-bar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold-2));min-width:0}
.mc-n{font-family:"Space Mono",monospace;font-size:.66rem;color:var(--gold-2);flex:none;min-width:3.2rem;text-align:right}
.mc-n em{font-style:normal;color:var(--on-dim)}
@media(max-width:760px){.home-top{grid-template-columns:1fr}}
.home-top+.menu-grid{margin-top:.6rem}
.tbx-hero{display:flex;align-items:center;gap:1rem;flex:1;min-height:0;padding:.2rem 0}
.tbx-chest{width:clamp(150px,44%,210px);flex:none;filter:drop-shadow(0 4px 12px rgba(228,161,27,.25))}
.tbx-chest svg{width:100%;height:auto;display:block}
body:not(.reduce-motion) .tbx-hero[data-left="1"] .tbx-chest,
body:not(.reduce-motion) .tbx-hero.ready .tbx-chest{animation:rumble 2.4s ease-in-out infinite}
@keyframes rumble{0%,86%,100%{transform:none}88%{transform:translateX(-1.5px) rotate(-.8deg)}91%{transform:translateX(1.5px) rotate(.8deg)}94%{transform:translateX(-1px)}97%{transform:translateX(1px)}}
.tbx-side{display:flex;flex-direction:column;gap:.3rem;min-width:0}
@media(max-width:420px){.tbx-hero{flex-direction:column;text-align:center}.tbx-side{align-items:center}.btn-open{align-self:center}}
.tbx-cnt{font-family:"Space Mono",monospace;font-size:.72rem;letter-spacing:.1em;color:var(--ink-soft)}
.tbx-cnt b{font-size:1.35rem;color:var(--gold-ink)}
.tbx-hint{font-size:.72rem;color:var(--ink-soft)}
.tbx-hint em{font-style:normal;color:#B08D2A;letter-spacing:.05em}
.tbx-note{font-size:.78rem;color:var(--gold-ink);font-weight:700}
.btn-open{font-family:"BIZ UDPGothic",sans-serif;font-weight:700;font-size:1rem;color:#4A3302;
  background:linear-gradient(120deg,var(--gold-2),var(--gold));border:0;border-radius:12px;padding:.6rem 1.3rem;
  box-shadow:0 4px 14px rgba(228,161,27,.45);margin-top:.2rem;align-self:flex-start}
body:not(.reduce-motion) .btn-open{animation:openpulse 1.6s ease-in-out infinite}
@keyframes openpulse{0%,100%{box-shadow:0 4px 14px rgba(228,161,27,.45)}50%{box-shadow:0 4px 24px rgba(228,161,27,.85)}}
.m-cards{display:flex;flex-direction:column;gap:.4rem;margin-top:.3rem}
.m-card{display:flex;align-items:center;gap:.7rem;text-align:left;background:#fff;border:1px solid var(--rule);
  border-radius:11px;padding:.48rem .75rem;transition:border-color .12s,transform .12s,box-shadow .12s}
.m-card:not(.done):hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:0 3px 10px rgba(46,107,255,.12)}
.m-card .m-lock{font-size:1rem;color:#C9C2AC;flex:none}
.m-card .m-t{flex:1;min-width:0;display:flex;flex-direction:column;gap:.16rem}
.m-card b{font-size:.85rem;color:var(--ink)}
.m-card .m-prog{display:flex;align-items:center;gap:.5rem}
.m-card .m-bar{flex:1;max-width:9rem;height:4px;border-radius:2px;background:#EDEBE4;overflow:hidden}
.m-card .m-bar i{display:block;height:100%;background:var(--blue);border-radius:2px}
.m-card .m-n{font-family:"Space Mono",monospace;font-size:.62rem;color:var(--ink-soft)}
.m-card .m-go{flex:none;font-family:"BIZ UDPGothic",sans-serif;font-size:.72rem;color:var(--blue)}
.m-card.done{background:var(--gold-soft);border-color:var(--gold)}
.m-card.done .m-lock{color:var(--gold)}
.m-card.done .m-bar i{background:var(--gold)}
.m-card.done .m-go,.m-card.done b{color:var(--gold-ink)}
.mis-done{display:flex;align-items:center;gap:.55rem;font-size:.84rem;font-weight:700;color:var(--gold-ink);padding:.25rem 0 .1rem}
.mis-done .md-stamp{font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;font-weight:700;
  color:var(--gold-ink);border:1.5px solid var(--gold);border-radius:6px;padding:.15rem .5rem;transform:rotate(-3deg);flex:none;background:#FFFDF4}
body:not(.reduce-motion) .mis-done{animation:stampIn .4s cubic-bezier(.3,1.4,.5,1)}
@keyframes keypop{0%{transform:scale(.4) rotate(-30deg)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
.mis-body{display:flex;gap:1rem;align-items:center;flex:1;min-height:0}
.mis-list{flex:1;min-width:0}
.mission-row .m-dia{font-size:.92rem;line-height:1;color:#CFC7AE;flex:none;width:18px;text-align:center}
.mission-row.done .m-dia{color:var(--gold)}
.mission-row .m-ok{width:16px;height:16px;color:var(--ok);margin-left:auto;flex:none}
.mission-row .m-ok svg{width:100%;height:100%}

@keyframes chestpop{0%{transform:scale(.75) rotate(-5deg)}60%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1)}}
.mission-note2{display:flex;align-items:center;gap:.4rem;font-family:"Space Mono",monospace;font-size:.66rem;color:var(--gold-ink);margin-top:.45rem}
.mission-note2 svg{width:13px;height:13px}
.mission-note2 b{font-size:.8rem}
.mix-chip{font-family:"Space Mono",monospace;font-size:.58rem;letter-spacing:.1em;color:var(--gold-ink);
  border:1px solid var(--gold);border-radius:5px;padding:.08rem .35rem;margin-left:.45rem}
.f-review-note{font-size:.8rem;color:var(--ink-soft);margin-top:.7rem}
.fin-sheet{max-width:760px;margin-left:auto;margin-right:auto}
.fin-sheet .finish{position:relative;overflow:hidden;padding:1.6rem .8rem 1.4rem}
.fin-emblem{width:172px;margin:0 auto .2rem;filter:drop-shadow(0 4px 12px rgba(228,161,27,.3))}
.fin-emblem svg{width:100%;height:auto;display:block}
body:not(.reduce-motion) .fg-rays{transform-origin:100px 72px;animation:rays 18s linear infinite}
body:not(.reduce-motion) .fg-medal{transform-origin:100px 72px;animation:keypop .6s cubic-bezier(.34,1.56,.64,1)}
body:not(.reduce-motion) .fg-spark path{animation:twinkle 1.9s ease-in-out infinite}
body:not(.reduce-motion) .fg-spark path:nth-child(2){animation-delay:.5s}
body:not(.reduce-motion) .fg-spark path:nth-child(3){animation-delay:1s}
body:not(.reduce-motion) .fg-spark path:nth-child(4){animation-delay:1.4s}
.fin-confetti{position:absolute;inset:0;pointer-events:none}
.fin-confetti i{position:absolute;top:-14px;font-style:normal;opacity:0}
.fin-confetti i::before{content:"◆";font-size:.7rem;color:var(--gold)}
.fin-confetti i:nth-child(3n)::before{color:var(--blue);font-size:.55rem}
.fin-confetti i:nth-child(4n)::before{color:var(--red);font-size:.5rem}
.fin-confetti i:nth-child(1){left:4%}.fin-confetti i:nth-child(2){left:12%}.fin-confetti i:nth-child(3){left:19%}
.fin-confetti i:nth-child(4){left:27%}.fin-confetti i:nth-child(5){left:34%}.fin-confetti i:nth-child(6){left:42%}
.fin-confetti i:nth-child(7){left:50%}.fin-confetti i:nth-child(8){left:58%}.fin-confetti i:nth-child(9){left:65%}
.fin-confetti i:nth-child(10){left:73%}.fin-confetti i:nth-child(11){left:80%}.fin-confetti i:nth-child(12){left:87%}
.fin-confetti i:nth-child(13){left:93%}.fin-confetti i:nth-child(14){left:97%}
body:not(.reduce-motion) .fin-confetti i{animation:confall 1.7s ease-in forwards}
body:not(.reduce-motion) .fin-confetti i:nth-child(2n){animation-duration:2.1s;animation-delay:.15s}
body:not(.reduce-motion) .fin-confetti i:nth-child(3n){animation-delay:.35s}
body:not(.reduce-motion) .fin-confetti i:nth-child(5n){animation-delay:.55s;animation-duration:2.4s}
@keyframes confall{0%{transform:translateY(0) rotate(0);opacity:1}80%{opacity:1}
 100%{transform:translateY(420px) rotate(260deg);opacity:0}}
.reward{margin-top:.55rem;border:1.5px dashed var(--gold);background:linear-gradient(135deg,#FBF3DC,#FFFAEE);border-radius:12px;
  padding:.55rem .8rem;display:flex;gap:.7rem;align-items:center;flex-wrap:wrap;position:relative}
body:not(.reduce-motion) .reward.new{animation:rwin .5s ease}
@keyframes rwin{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:none}}
.reward .r-stamp{font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-ink);
  border:1.5px solid var(--gold);border-radius:6px;padding:.14rem .45rem;transform:rotate(-4deg);flex:none}
.reward .r-t{display:flex;flex-direction:column;gap:.05rem;min-width:0}
.reward .r-en{font-weight:700;font-size:1.02rem;color:var(--ink)}
.reward .r-ja{font-size:.74rem;color:var(--ink-soft)}
.reward .r-note{flex-basis:100%;font-family:"Space Mono",monospace;font-size:.6rem;color:var(--gold-ink)}
.reward.loot{background:radial-gradient(130% 150% at 50% 0%,#2B2F63 0%,#191C3C 55%,#12142E 100%);
  border:1.5px solid var(--gold);flex-wrap:nowrap;align-items:center;justify-content:center;gap:1.1rem;padding:.6rem 1rem;overflow:hidden;margin-top:.4rem;flex:1;min-height:0}
.loot-chest{width:clamp(96px,26%,150px);flex:none;filter:drop-shadow(0 4px 14px rgba(245,198,79,.35))}
.loot-chest svg{width:100%;height:auto;display:block}
body:not(.reduce-motion) .kg-rays{transform-origin:100px 66px;animation:rays 16s linear infinite}
@keyframes rays{to{transform:rotate(360deg)}}
body:not(.reduce-motion) .kg-spark path{animation:twinkle 1.8s ease-in-out infinite}
body:not(.reduce-motion) .kg-spark path:nth-child(2){animation-delay:.4s}
body:not(.reduce-motion) .kg-spark path:nth-child(3){animation-delay:.9s}
body:not(.reduce-motion) .kg-spark path:nth-child(4){animation-delay:1.3s}
@keyframes twinkle{0%,100%{opacity:.25}50%{opacity:1}}
.loot-t{display:flex;flex-direction:column;gap:.16rem;align-items:flex-start;text-align:left;min-width:0}
@media(max-width:760px){.reward.loot{flex-direction:column}.loot-t{align-items:center;text-align:center}}
.reward.loot .r-stamp{color:var(--gold-2);border-color:var(--gold-2)}
.reward.loot .r-en{color:#fff;font-size:1.15rem}
.reward.loot .r-ja{color:#C6CBEF;font-size:.8rem}
.reward.loot .btn-speak{border-color:#7E8FE8;color:#D3DAFF;background:transparent;margin-top:.15rem;padding:.25rem .7rem}
.reward.loot .r-note{color:#9BA3D8;flex-basis:auto;font-size:.56rem}
.loot-fx{position:absolute;inset:0;pointer-events:none}
.loot-fx i{position:absolute;font-style:normal;font-size:.55rem;color:var(--gold-2);opacity:.7}
.loot-fx i:nth-child(1){left:8%;top:18%}.loot-fx i:nth-child(2){left:16%;top:70%;color:#7E8FE8}
.loot-fx i:nth-child(3){left:46%;top:12%;font-size:.4rem}.loot-fx i:nth-child(4){left:88%;top:24%}
.loot-fx i:nth-child(5){left:80%;top:72%;color:#7E8FE8;font-size:.4rem}.loot-fx i:nth-child(6){left:94%;top:55%;font-size:.45rem}
body:not(.reduce-motion) .loot-fx i{animation:floaty 3.2s ease-in-out infinite}
body:not(.reduce-motion) .loot-fx i:nth-child(2n){animation-delay:1.1s}
body:not(.reduce-motion) .loot-fx i:nth-child(3n){animation-delay:2s}
@keyframes floaty{0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(-5px);opacity:1}}


/* home quick stats */
.mini-stats{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.35rem}
.mini-stats span{font-family:"Space Mono",monospace;font-size:.64rem;color:var(--ink-soft);background:var(--paper-2);border-radius:999px;padding:.16rem .6rem}
.mini-stats b{color:var(--ink)}

/* home menu: primary row + secondary row */
.menu-top{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:.55rem}
.menu-top.single{grid-template-columns:1fr}
.menu-big{border-radius:14px;padding:.85rem 1rem;text-align:left;display:flex;align-items:center;gap:.8rem;
  border:1px solid rgba(255,255,255,.08);background:var(--table-2);transition:border-color .12s,transform .12s;cursor:pointer}
.menu-big:hover{transform:translateY(-1px)}
.menu-big .mi{width:30px;height:30px;flex:none}
.menu-big .mt{display:flex;flex-direction:column;gap:.12rem}
.menu-big b{font-size:1.02rem;color:var(--on)}
.menu-big small{font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--on-dim)}
.menu-big.gold{border-color:rgba(228,161,27,.55);background:linear-gradient(135deg,rgba(228,161,27,.14),var(--table-2) 55%)}
.menu-big.gold .mi{color:var(--gold-2)}
.menu-big.gold:hover{border-color:var(--gold-2)}
.menu-big.blue{border-color:rgba(92,139,255,.45);background:linear-gradient(135deg,rgba(46,107,255,.13),var(--table-2) 55%)}
.menu-big.blue .mi{color:var(--blue-2)}
.menu-big.blue:hover{border-color:var(--blue-2)}
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem}
@media(max-width:680px){.menu-grid{grid-template-columns:1fr}.menu-top{grid-template-columns:1fr}}
.menu-card{background:var(--table-2);border:1px solid rgba(255,255,255,.07);border-radius:12px;
  padding:.55rem .75rem;text-align:left;display:flex;align-items:center;gap:.6rem;transition:border-color .12s,transform .12s;border-left-width:3px}
.menu-card .mt{display:flex;flex-direction:column;gap:.08rem}
.menu-card:hover{transform:translateY(-1px)}
.menu-card .mi{width:20px;height:20px;flex:none}
.menu-card.c-blue{border-left-color:var(--blue)}.menu-card.c-blue .mi{color:var(--blue-2)}.menu-card.c-blue:hover{border-color:rgba(92,139,255,.55);border-left-color:var(--blue)}
.menu-card.c-red{border-left-color:var(--red)}.menu-card.c-red .mi{color:#FF7A6E}.menu-card.c-red:hover{border-color:rgba(255,77,61,.5);border-left-color:var(--red)}
.menu-card.c-gold{border-left-color:var(--gold)}.menu-card.c-gold .mi{color:var(--gold-2)}.menu-card.c-gold:hover{border-color:rgba(228,161,27,.55);border-left-color:var(--gold)}
.menu-card b{font-size:.92rem;color:var(--on)}
.menu-card small{font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--on-dim)}
.menu-card .cnt{font-family:"Space Mono",monospace;font-size:.68rem;color:var(--gold-2)}
.rev-card{background:var(--table-2);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:.3rem .4rem}
.rev-row{display:flex;align-items:center;gap:.7rem;width:100%;text-align:left;padding:.48rem .7rem;border-radius:10px;cursor:pointer}
.rev-row+.rev-row{border-top:1px dashed rgba(255,255,255,.08)}
.rev-row:hover{background:rgba(255,255,255,.04)}
.rev-row .mi{width:20px;height:20px;color:var(--gold-2);flex:none}
.rev-row .rr-t{display:flex;flex-direction:column;gap:.1rem}
.rev-row b{font-size:.9rem;color:var(--on)}
.rev-row small{font-size:.72rem;color:var(--on-dim)}
.rev-row .cnt{margin-left:auto;font-family:"Space Mono",monospace;font-size:.72rem;color:var(--gold-2);flex:none}
.rev-row .arw{color:var(--on-dim);flex:none}
.rev-row.off{cursor:default;opacity:.55}
.rev-row.off:hover{background:transparent}
.rev-row.off .mi,.rev-row.off .cnt{color:var(--on-dim)}
.btn-primary{font-family:"Andika",sans-serif;font-weight:600;font-size:.98rem;letter-spacing:.01em;
  color:#fff;background:var(--blue);padding:.55rem 1.25rem;border-radius:10px;
  display:inline-flex;align-items:center;gap:.5rem;transition:transform .12s,background .12s}
.btn-primary:hover{background:#255CE6}
.btn-primary:active{transform:translateY(1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-primary svg{width:17px;height:17px}
.btn-gold{background:var(--gold);color:#1F1608}
.btn-gold:hover{background:#D69614}

/* ===== map ===== */
.world{margin-bottom:1rem}
.world-head{display:flex;align-items:baseline;gap:.7rem;margin:.2rem 0 .5rem}
.world-head .w-name{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:1.05rem;color:var(--on)}
.world-head .w-sub{font-family:"Space Mono",monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--on-dim)}
.world-head .w-prog{margin-left:auto;font-family:"Space Mono",monospace;font-size:.7rem;color:var(--gold-2)}
.unit-list{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;align-items:start}
@media(max-width:720px){.unit-list{grid-template-columns:1fr}}
details.unit{background:var(--table-2);border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden}
details.unit[open]{border-color:rgba(228,161,27,.5)}
details.unit summary{list-style:none;cursor:pointer;padding:.7rem .85rem;display:flex;align-items:center;gap:.7rem}
details.unit summary::-webkit-details-marker{display:none}
.u-no{font-family:"Space Mono",monospace;font-size:.7rem;font-weight:700;color:var(--on-soft);
  min-width:2rem;height:2rem;border:1px solid rgba(255,255,255,.12);border-radius:8px;
  display:flex;align-items:center;justify-content:center}
details.unit[open] .u-no{color:#1F1608;background:var(--gold);border-color:var(--gold)}
.u-name{flex:1;font-weight:600;font-size:.92rem;line-height:1.28;color:var(--on)}
.u-name small{display:block;font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.06em;
  color:var(--on-dim);text-transform:uppercase;font-weight:400;margin-top:.05rem}
.u-prog{font-family:"Space Mono",monospace;font-size:.72rem;color:var(--on-dim)}
.u-prog.full{color:var(--gold-2)}
.u-actions{display:flex;gap:.4rem;padding:.55rem .85rem;border-top:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
.u-actions button{font-family:"Space Mono",monospace;font-size:.64rem;letter-spacing:.06em;text-transform:uppercase;
  padding:.34rem .65rem;border-radius:8px;border:1px solid rgba(255,255,255,.16);color:var(--on-soft)}
.u-actions button:hover{color:var(--on);border-color:rgba(92,139,255,.6)}
.q-rows{border-top:1px solid rgba(255,255,255,.06)}
.q-row{width:100%;display:flex;align-items:center;gap:.6rem;text-align:left;
  padding:.55rem .85rem;font-size:.86rem;color:var(--on-soft);border-top:1px solid rgba(255,255,255,.04)}
.q-row:hover{background:rgba(228,161,27,.07);color:var(--on)}
.q-row .qn{font-family:"Space Mono",monospace;font-size:.62rem;color:var(--on-dim);min-width:1.6rem}
.q-row .q-ja2{flex:1;line-height:1.35}
.keyset{display:flex;gap:3px;margin-left:auto}
.keyset svg{width:13px;height:13px;color:rgba(255,255,255,.16)}
.keyset svg.got{color:var(--gold-2)}
.master-star{color:var(--gold-2);font-family:"Space Mono",monospace;font-size:.62rem}

/* ===== training ===== */
.train-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;gap:.6rem;flex-wrap:wrap}
.btn-quit{font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--on-soft);padding:.35rem .55rem;border-radius:8px}
.btn-quit:hover{color:var(--on);background:rgba(255,255,255,.05)}
.steps{display:flex;gap:.35rem;align-items:center;flex-wrap:wrap}
.stp{font-family:"Space Mono",monospace;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;
  padding:.24rem .55rem;border-radius:999px;color:var(--on-dim);border:1px solid rgba(255,255,255,.1)}
.stp.on{color:var(--table);background:var(--on);border-color:var(--on)}
.stp.past{color:var(--gold-2);border-color:rgba(228,161,27,.55)}
.train-sheet{padding:1.25rem 1.35rem 1.2rem}
.q-meta{font-family:"Space Mono",monospace;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);display:flex;gap:.8rem;flex-wrap:wrap}
.q-meta .gold{color:var(--gold-ink)}
.q-en{font-family:"Andika",sans-serif;font-weight:700;font-size:1.4rem;line-height:1.42;color:var(--ink);margin:.35rem 0 .15rem;word-break:break-word}
.q-en .hit{color:var(--blue)}
.q-en .miss{color:#C0392B;background:var(--warn-soft);border-radius:3px;text-decoration:underline wavy #C0392B 1.5px;text-underline-offset:3px}
.q-en .rest{color:#B9BDB2}
.q-ja{color:var(--ink-soft);font-size:.95rem;font-weight:500}
.q-ja.big{font-size:1.15rem;color:var(--ink);font-weight:700}
.type-line{margin-top:.9rem}
.type-line input,.type-line textarea{width:100%;border:1.5px solid var(--rule);border-radius:10px;padding:.6rem .75rem;
  background:#fff;line-height:1.55;font-family:"Andika","BIZ UDPGothic",sans-serif;font-size:1.05rem}
.type-line input:focus,.type-line textarea:focus{border-color:var(--blue)}
.type-line textarea{resize:vertical;min-height:3.2rem}
.type-stats{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem}
.type-stats span{font-family:"Space Mono",monospace;font-size:.64rem;color:var(--ink-soft);background:var(--paper-2);border-radius:999px;padding:.15rem .55rem}
.type-stats b{color:var(--ink)}

/* word order chips */
.order-area{margin:.8rem 0 .2rem}
.order-built{min-height:3rem;border:1.5px dashed var(--rule);border-radius:10px;background:var(--paper-2);
  padding:.5rem .6rem;display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
.order-bank{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:.6rem}
.w-chip{font-family:"Andika",sans-serif;font-size:.95rem;font-weight:600;padding:.32rem .7rem;border-radius:9px;
  border:1.5px solid var(--blue);color:var(--blue);background:#fff;transition:transform .08s;position:relative}
.w-chip:active{transform:scale(.94)}
.w-chip.used{opacity:.25;pointer-events:none}
.w-chip .kbd{position:absolute;top:-7px;right:-5px;font-family:"Space Mono",monospace;font-size:.54rem;
  background:var(--ink);color:#fff;border-radius:4px;padding:0 .25rem}
.w-chip.built{border-color:var(--rule);color:var(--ink)}
.order-note{font-family:"Space Mono",monospace;font-size:.62rem;color:var(--ink-soft);margin-top:.4rem}

/* feedback */
.fb{margin-top:.8rem;border-radius:10px;padding:.65rem .85rem;font-size:.9rem;line-height:1.6}
.fb.good{background:var(--ok-soft);color:#14563C;border:1px solid #BFE5D2}
.fb.almost{background:var(--warn-soft);color:#6E4A16;border:1px solid #EBD5AE}
.fb.info{background:var(--blue-soft);color:var(--blue-ink);border:1px solid #CBD9FB}
.fb .h{font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;display:block;margin-bottom:.15rem;opacity:.75}
.fb ul{margin:.2rem 0 0 1.1rem}
.fb li{margin:.1rem 0}
.stamp{position:absolute;right:.8rem;top:.6rem;font-family:"Space Mono",monospace;font-weight:700;
  letter-spacing:.1em;font-size:.72rem;color:var(--red);border:2px solid var(--red);border-radius:6px;
  padding:.08rem .45rem;transform:rotate(-7deg);animation:stampIn .3s cubic-bezier(.3,1.4,.5,1)}
.stamp.gold{color:var(--gold-ink);border-color:var(--gold)}
@keyframes stampIn{from{transform:rotate(-7deg) scale(1.7);opacity:0}to{transform:rotate(-7deg) scale(1);opacity:1}}

/* hint */
.aid{margin-top:.7rem;display:flex;gap:.45rem;flex-wrap:wrap;align-items:center}
.btn-aid{font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;
  padding:.4rem .8rem;border-radius:8px;border:1px solid var(--blue);color:var(--blue);background:#fff}
.btn-aid:disabled{opacity:.35;cursor:not-allowed}
.aid-note{font-family:"Space Mono",monospace;font-size:.6rem;color:var(--ink-soft)}
.aid-box{margin-top:.5rem;background:var(--blue-soft);border-radius:10px;padding:.6rem .8rem;font-size:.9rem;color:var(--ink);line-height:1.7}
.aid-box.hints{display:flex;flex-direction:column;gap:0;padding:.15rem .8rem}
.hint-row{display:flex;align-items:baseline;gap:.6rem;padding:.34rem 0;font-size:.92rem}
.hint-row+.hint-row{border-top:1px dashed rgba(46,107,255,.18)}
.hint-row .h-tag{flex:none;font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.06em;color:var(--blue);
  display:inline-flex;align-items:baseline;gap:.3rem;width:4.6rem}
.hint-row .h-tag em{font-style:normal;color:var(--ink-soft);font-family:"BIZ UDPGothic",sans-serif;font-size:.68rem}
.aid-box .h{font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--blue-ink);display:block;margin-bottom:.15rem}
.aid-box .en{font-weight:700}

/* structure blueprint */
.blueprint{margin-top:.8rem;background:var(--paper-2);border:1px solid var(--rule);border-radius:12px;padding:.7rem .85rem}
.blueprint .h{font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:.4rem}
.bp-row{display:flex;gap:.4rem;flex-wrap:wrap}
.bp-cell{border-radius:9px;padding:.3rem .6rem .35rem;border:1.5px solid var(--rule);background:#fff;text-align:center}
.bp-cell .w{font-family:"Andika",sans-serif;font-weight:700;font-size:.98rem;color:var(--ink);display:block}
.bp-cell .role{font-size:.62rem;color:var(--ink-soft);display:block;margin-top:.05rem}
body[data-colors="on"] .bp-cell.role-s{background:#FFF6D9;border-color:#EAD588}
body[data-colors="on"] .bp-cell.role-v{background:#FFE7DC;border-color:#F0A587}
body[data-colors="on"] .bp-cell.role-o{background:var(--blue-soft);border-color:#BFD0F7}
body[data-colors="on"] .bp-cell.role-x{background:#DCF3EC;border-color:#7FCDB4}
body[data-colors="hc"] .bp-cell{border-width:2.5px}
body[data-colors="hc"] .bp-cell.role-s{border-color:#8A6008}
body[data-colors="hc"] .bp-cell.role-v{border-color:#C63C00}
body[data-colors="hc"] .bp-cell.role-o{border-color:#1B3E99}
body[data-colors="hc"] .bp-cell.role-x{border-color:#00694B}
.pattern-tag{font-family:"Space Mono",monospace;font-size:.66rem;color:var(--ink-soft);background:#fff;border:1px solid var(--rule);border-radius:999px;padding:.16rem .6rem;display:inline-block;margin-top:.5rem}

/* speech / confidence */
.speak-row{display:flex;gap:.5rem;align-items:center;margin-top:.7rem;flex-wrap:wrap}
.btn-speak{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;font-weight:600;color:var(--blue);
  border:1.5px solid var(--blue);border-radius:999px;padding:.35rem .85rem;background:#fff}
.btn-speak svg{width:15px;height:15px}
.speak-note{font-family:"Space Mono",monospace;font-size:.62rem;color:var(--ink-soft)}
.conf-row{display:flex;gap:.45rem;margin-top:.7rem;flex-wrap:wrap;align-items:center}
.conf-note{flex-basis:100%;font-size:.68rem;color:var(--ink-soft)}
.conf-btn{flex:1;min-width:110px;border:1.5px solid var(--rule);border-radius:10px;background:#fff;
  padding:.5rem .6rem;font-size:.85rem;color:var(--ink);transition:border-color .1s}
.conf-btn:hover{border-color:var(--blue)}
.conf-btn.on{border-color:var(--blue);background:var(--blue-soft)}
.train-nav{display:flex;justify-content:space-between;gap:.7rem;margin-top:1.1rem;flex-wrap:wrap}
.btn-ghost{font-family:"Space Mono",monospace;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink-soft);padding:.55rem .9rem;border-radius:10px;border:1.5px solid var(--rule);background:#fff}
.btn-ghost:hover{border-color:var(--ink-soft)}
.key-earn{position:relative;display:flex;align-items:center;gap:.7rem;background:linear-gradient(120deg,#FFF8E4,#FBF0CF);
  border:1.5px solid var(--gold);border-radius:14px;padding:.7rem 1rem;margin-top:.8rem;overflow:hidden;
  animation:stampIn .35s cubic-bezier(.3,1.4,.5,1)}
.key-earn::after{content:"";position:absolute;top:0;bottom:0;width:46px;left:-60px;transform:skewX(-18deg);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.85),transparent)}
body:not(.reduce-motion) .key-earn::after{animation:shine 1.1s ease .15s 1}
@keyframes shine{to{left:110%}}
.ke-icon{display:flex;align-items:center;justify-content:center;width:40px;height:40px;flex:none;border-radius:50%;
  background:var(--gold);color:#fff;box-shadow:0 2px 8px rgba(228,161,27,.45)}
.ke-icon svg{width:21px;height:21px}
body:not(.reduce-motion) .ke-icon{animation:keypop .45s cubic-bezier(.34,1.56,.64,1)}
.ke-t b{font-size:1rem;color:var(--gold-ink);display:block}
.ke-dias{display:flex;align-items:center;gap:.3rem;margin-top:.15rem}
.ke-dias i{font-style:normal;font-size:1rem;line-height:1;color:#E0D7BC}
.ke-dias i.on{color:var(--gold)}
.ke-dias small{font-size:.72rem;color:#8A6008;margin-left:.3rem}
.key-earn.master{background:linear-gradient(120deg,var(--gold-2),var(--gold));border-color:#C98F12}
.key-earn.master .ke-icon{background:#fff;color:var(--gold)}
.key-earn.master .ke-t b{color:#4A3302;letter-spacing:.04em}
.key-earn.master .ke-dias i.on{color:#fff;text-shadow:0 1px 0 rgba(0,0,0,.15)}
.key-earn.master .ke-dias small{color:#5E4104}
.ke-burst{position:absolute;left:28px;top:50%;width:0;height:0;pointer-events:none}
.ke-burst i{position:absolute;font-style:normal}
.ke-burst i::before{content:"◆";font-size:.6rem;color:var(--gold)}
.ke-burst i:nth-child(2n)::before{color:var(--blue-2)}
.ke-burst i:nth-child(3n)::before{font-size:.45rem}
body:not(.reduce-motion) .ke-burst i{animation:burst .8s ease-out .1s forwards;opacity:0}
.ke-burst i:nth-child(1){--bx:46px;--by:-30px}.ke-burst i:nth-child(2){--bx:70px;--by:-6px}
.ke-burst i:nth-child(3){--bx:52px;--by:22px}.ke-burst i:nth-child(4){--bx:14px;--by:-40px}
.ke-burst i:nth-child(5){--bx:-14px;--by:-26px}.ke-burst i:nth-child(6){--bx:-26px;--by:8px}
.ke-burst i:nth-child(7){--bx:10px;--by:34px}.ke-burst i:nth-child(8){--bx:88px;--by:-28px}
@keyframes burst{0%{transform:translate(0,0) scale(.4);opacity:1}80%{opacity:1}
  100%{transform:translate(var(--bx),var(--by)) scale(1) rotate(120deg);opacity:0}}

/* finish */
.finish{text-align:center;padding:.6rem 0 .3rem}
.finish .fstamp{display:inline-block;font-family:"Space Mono",monospace;font-weight:700;letter-spacing:.16em;
  color:var(--gold-ink);border:3px solid var(--gold);border-radius:12px;padding:.35rem 1.1rem;font-size:1.1rem;
  transform:rotate(-4deg);animation:stampIn .35s cubic-bezier(.3,1.4,.5,1)}
.finish .ftitle{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:1.1rem;color:var(--ink);margin-top:.7rem}
.f-detail{display:flex;justify-content:center;gap:.35rem;flex-wrap:wrap;margin:.55rem 0}
.f-detail span{font-family:"Space Mono",monospace;font-size:.66rem;color:var(--ink-soft);background:var(--paper-2);border-radius:999px;padding:.15rem .55rem}
.badge-pop{display:flex;align-items:center;gap:.7rem;background:#fff;border:1.5px solid var(--gold);border-radius:12px;
  padding:.6rem .85rem;margin:.5rem auto 0;max-width:420px;text-align:left;animation:stampIn .3s ease}
.badge-pop .bi{width:32px;height:32px;flex:none;color:var(--gold)}
.badge-pop b{font-size:.9rem;color:var(--ink)}
.badge-pop small{display:block;font-size:.72rem;color:var(--ink-soft)}

/* CBT */
.modal-back{position:fixed;inset:0;background:rgba(10,12,20,.62);backdrop-filter:blur(2px);z-index:50;
  display:flex;align-items:center;justify-content:center;padding:1rem}
body:not(.reduce-motion) .modal-back{animation:rwin .18s ease}
.modal{margin:0;width:min(480px,94vw);box-shadow:0 18px 50px rgba(0,0,0,.5)}
.cbt-setup .cs-lead{font-size:.9rem;color:var(--ink-soft);margin:.45rem 0 .6rem;max-width:44rem}
.rule-chips{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.9rem}
.rule-chips span{font-family:"BIZ UDPGothic",sans-serif;font-size:.72rem;color:var(--gold-ink);
  border:1px solid var(--gold);background:var(--gold-soft);border-radius:999px;padding:.22rem .65rem}
.cs-group{display:flex;align-items:center;gap:1rem;padding:.55rem 0;border-top:1px dashed rgba(0,0,0,.08)}

/* ---------- 問題コンパイル(ヒント等を自動生成) ---------- */
const Q=[];const QBY={};
function seedShuffle(arr,seedStr){const a=arr.slice();let s=0;for(const c of seedStr)s=(s*31+c.charCodeAt(0))>>>0;
 for(let i=a.length-1;i>0;i--){s=(s*9301+49297)%233280;const j=Math.floor(s/233280*(i+1));[a[i],a[j]]=[a[j],a[i]]}
 if(a.length>2&&a.join(" ")===arr.join(" "))a.push(a.shift());
 return a}
DATA.forEach((lv,li)=>{lv.units.forEach((u,ui)=>{u.items.forEach((it,qi)=>{
  const id=`L${li+1}-U${ui+1}-${qi+1}`;
  const en=it.en;
  const words=en.replace(/[.?!]+$/,"").split(" ");
  const punct=(en.match(/[.?!]$/)||["."])[0];
  const fl=words.map(w=>{const m=w.match(/^([A-Za-z])(.*)$/);return m?m[1]+m[2].replace(/[A-Za-z]/g,"_"):w;}).join(" ")+punct;
  const q={id,level:li+1,ui,qi,unit:u.name,ja:it.ja,answers:[en,...(it.alt||[])],en,
    words,punct,firstLetter:fl,pat:it.pat||"",st:it.st||null,exp:it.exp||"",
    hints:[it.pat||"文の型を思い出そう。",`${words.length}語で書きます。`,fl,seedShuffle(words,id).join(" / "),en]};
  Q.push(q);QBY[id]=q;
});});});

const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};

 ["we've","we have"],["they've","they have"],["I'll","I will"],["you'll","you will"],["he'll","he will"],
 ["she'll","she will"],["it'll","it will"],["we'll","we will"],["they'll","they will"],
 ["shouldn't","should not"],["wouldn't","would not"],["couldn't","could not"],["I'd","I would"]];
function normSp(s){return String(s).normalize("NFKC").replace(/[\u2018\u2019\u02BC]/g,"'").replace(/[\u201C\u201D]/g,'"')
  .replace(/\u3000/g," ").replace(/\s+/g," ").trim()}
/* 中学校で学習する同義語(意味がほぼ等価なものだけを厳選)。双方向に正解として扱う */
const SYN=[["bicycle","bike"],["bicycles","bikes"],["photo","picture"],["photos","pictures"],
 ["photograph","photo"],["movie","film"],["movies","films"],["everyone","everybody"],
 ["begin","start"],["begins","starts"],["began","started"],["beginning","starting"],
 ["big","large"],["bigger","larger"],["biggest","largest"]];
function expandVariants(ans){const set=new Set([normSp(ans)]);let grew=true;
  const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
  while(grew&&set.size<60){grew=false;
    for(const s of [...set]){for(const[c,f]of [...CONTR,...SYN]){
      for(const[cc,ff] of [[c,f],[cap(c),cap(f)]]){
        const a=s.replace(new RegExp("\\b"+cc+"\\b","g"),ff);
        if(a!==s&&!set.has(a)){set.add(a);grew=true}
        const b=s.replace(new RegExp("\\b"+ff+"\\b","g"),cc);
        if(b!==s&&!set.has(b)){set.add(b);grew=true}
      }}}}
  return set}
function contentKey(s){return normSp(s).toLowerCase().replace(/[.?!,"]/g,"").replace(/'/g,"").replace(/\s+/g," ").trim()}
function lev(a,b){const m=a.length,n=b.length,d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=1;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n]}
const PAST_IRR={go:"went",have:"had",get:"got",come:"came",see:"saw",make:"made",take:"took",give:"gave",send:"sent",tell:"told",teach:"taught",say:"said",eat:"ate",run:"ran",swim:"swam",sing:"sang",buy:"bought",think:"thought"};
/* 戻り値: {ok, perfect, issues[], msgs[]} */
function judge(input,q,strict){
  const inp=normSp(input);if(!inp)return{ok:false,perfect:false,issues:["empty"],msgs:["英文を入力してみよう。"]};
  let variants=new Set();q.answers.forEach(a=>expandVariants(a).forEach(v=>variants.add(v)));
  if(variants.has(inp))return{ok:true,perfect:true,issues:[],msgs:[]};
  const ck=contentKey(inp);const okContent=[...variants].some(v=>contentKey(v)===ck);
  const issues=[],msgs=[];
  if(okContent){
    if(/^[a-z]/.test(inp))
      {issues.push("capital");msgs.push("文頭は大文字で始めよう。")}
    const lastCh=inp.slice(-1);
    if(q.punct==="?"&&lastCh!=="?"){issues.push("qmark");msgs.push("たずねる文なので、最後に「?」を付けよう。")}
    else if(q.punct==="!"&&lastCh!=="!"){issues.push("emark");msgs.push("感嘆文なので、最後に「!」を付けよう。")}
    else if(q.punct==="."&&lastCh!=="."){issues.push("period");msgs.push("文の最後にピリオドを付けよう。")}
    if(q.en.includes("'")&&!inp.includes("'")){issues.push("apos");msgs.push("アポストロフィ(')を忘れずに。")}
    if(issues.length===0){issues.push("case");msgs.push("大文字・小文字をもう一度見直そう。")}
    return{ok:!strict,perfect:false,issues,msgs};
  }
  /* 内容の誤り分析: 最も近い正解と比較 */
  let best=null,bestD=1e9;
  for(const v of variants){const d=lev(contentKey(v),ck);if(d<bestD){bestD=d;best=v}}
  const aw=contentKey(best).split(" "),iw=ck.split(" ");
  const aSet={},iSet={};aw.forEach(w=>aSet[w]=(aSet[w]||0)+1);iw.forEach(w=>iSet[w]=(iSet[w]||0)+1);
  const missing=[],extra=[];
  Object.keys(aSet).forEach(w=>{if((iSet[w]||0)<aSet[w])missing.push(w)});
  Object.keys(iSet).forEach(w=>{if((aSet[w]||0)<iSet[w])extra.push(w)});
  const sameSet=missing.length===0&&extra.length===0;
  if(sameSet&&aw.join(" ")!==iw.join(" ")){issues.push("order");msgs.push("使う単語は合っています。語順をもう一度考えてみよう。")}
  else{
    /* スペル: missing と extra のペアで距離1-2 */
    const spellPairs=[];
    missing.slice().forEach(mw=>{extra.slice().forEach(ew=>{
      if(lev(mw,ew)<=Math.max(1,Math.floor(mw.length/4))&&!spellPairs.some(p=>p[0]===mw||p[1]===ew))spellPairs.push([mw,ew])})});
    spellPairs.forEach(([mw,ew])=>{
      issues.push("spell");
      /* 文法ヒューリスティック */
      if(ew+"s"===mw||ew+"es"===mw)msgs.push(`主語に合わせて、動詞の形(${mw})を確認しよう。`);
      else if(mw+"s"===ew||mw+"es"===ew)msgs.push(`この文では「${mw}」と原形(または単数形)を使います。`);
      else if(PAST_IRR[ew]===mw)msgs.push(`過去のことなので、動詞を過去形(${mw})にしよう。`);
      else if(ew+"ed"===mw||ew+"d"===mw)msgs.push(`過去のことなので、動詞を過去形にしよう。`);
      else if(["am","is","are","was","were"].includes(mw)&&["am","is","are","was","were"].includes(ew))msgs.push(`主語に合うbe動詞は「${mw}」です。`);
      else msgs.push(`「${ew}」のスペルをもう一度確認しよう。`);
      missing.splice(missing.indexOf(mw),1);extra.splice(extra.indexOf(ew),1);});
    if(missing.length){issues.push("missing");
      if(missing.every(w=>["a","an","the"].includes(w)))msgs.push("冠詞(a / an / the)を忘れていないかな。");
      else msgs.push(`足りない単語がありそうです: ${missing.slice(0,3).join(", ")}`)}
    if(extra.length){issues.push("extra");msgs.push(`この文では使わない単語があります: ${extra.slice(0,3).join(", ")}`)}
    if(!issues.length){issues.push("other");msgs.push("もう一度、日本語の意味と語順を確かめてみよう。")}
  }
  return{ok:false,perfect:false,issues,msgs};
}

/* ---------- 間隔反復 ---------- */
function schedule(q,result){/* result: wrong | hint | self | guess | surewrong */
  const st=qs(q.id);
  if(result==="wrong"){st.wins=0;st.due=todayStr();st.st="要復習";st.wrong++}
  else if(result==="surewrong"){st.wins=0;st.due=todayStr();st.st="要復習";st.wrong++;st.pri=1}
  else if(result==="guess"){st.due=addDays(1);st.st="練習中"}
  else if(result==="hint"){st.due=addDays(1);st.st="ヒントありで正解"}
  else{st.wins++;st.st=st.wins>=3?"定着":"自力で正解";
    st.due=addDays(st.wins===1?3:st.wins===2?7:st.wins===3?14:30);st.pri=0}
  save()}
function dueList(){const t=todayStr();return Q.filter(q=>{const s=S.q[q.id];return s&&s.due&&s.due<=t})
  .sort((a,b)=>(S.q[b.id].pri||0)-(S.q[a.id].pri||0))}
function unsureList(){return Q.filter(q=>{const s=S.q[q.id];return s&&!isMaster(q.id)&&(["要復習","ヒントありで正解","練習中"].includes(s.st)||["mid","guess"].includes(s.conf))})}

function sfx(kind){if(!S.set.sfx)return;try{
 AC=AC||new (window.AudioContext||window.webkitAudioContext)();
 if(AC.state==="suspended")AC.resume();
 const t=AC.currentTime;
 const tone=(f,st,d,type,vol)=>{type=type||"sine";vol=vol||.1;
  const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.setValueAtTime(f,t+st);
  g.gain.setValueAtTime(0,t+st);g.gain.linearRampToValueAtTime(vol,t+st+.012);g.gain.exponentialRampToValueAtTime(.0008,t+st+d);
  o.connect(g);g.connect(AC.destination);o.start(t+st);o.stop(t+st+d+.03)};
 if(kind==="ok"){tone(659,0,.12);tone(880,.09,.18)}
 else if(kind==="key"){tone(523,0,.1);tone(659,.08,.1);tone(784,.16,.24,"sine",.12)}
 else if(kind==="chest"){tone(392,0,.16,"triangle",.11);tone(523,.12,.16,"triangle",.11);tone(659,.24,.16,"triangle",.12);tone(1047,.38,.4,"triangle",.13)}
 else if(kind==="ng"){tone(233,0,.14,"sine",.05)}
}catch(e){}}

function startSession(ids,mode,label,review){
 if(!ids.length){alert("いまはこのリストに問題がありません。マップから練習してみよう!");return}
 let list=ids.slice(),mixed={};
 if(!review&&mode==="write"){ /* 定着のため、期限がきた復習問題を自動で混ぜる(インターリーブ) */
   const extra=dueList().map(q=>q.id).filter(id=>!list.includes(id)).slice(0,2);
   extra.forEach((id,i)=>{const pos=i===0?0:Math.min(list.length,Math.ceil(list.length/2));list.splice(pos,0,id);mixed[id]=1});
 }
 session={list,idx:0,mode,label,review:!!review,att:null,requeued:{},correct:0,t0:Date.now(),mixed};
 S.resume={list,idx:0,mode,label,review:!!review,mixed};save();
 view="session";render()}
function resumeSession(){const r=S.resume;if(!r)return;
 session={list:r.list.filter(id=>QBY[id]),idx:Math.min(r.idx,r.list.length-1),mode:r.mode,label:r.label,review:r.review,att:null,requeued:{},correct:0,t0:Date.now(),mixed:r.mixed||{}};
 if(!session.list.length){S.resume=null;save();return}
 view="session";render()}
function curQ(){return QBY[session.list[session.idx]]}
function newAtt(){const q=curQ();session.att={tries:0,hint:0,conf:"",done:false,step:1,phase:0,
 t0:0,total:0,err:0,bs:0,prevLen:0,order:[],usedIdx:[],result:"",acc:null,wpm:null,retry:(S.q[q.id]?.wrong||0)>0}}

   session.list.map((_,i)=>`<span class="stp ${i===session.idx?'on':i<session.idx?'past':''}">${i+1}</span>`).join("");
 let body="";
 if(a.done)body=vDone(q,a);
 else if(m==="copy")body=vCopy(q,a);
 else if(m==="step")body=vStep(q,a);
 else if(m==="order")body=vOrder(q,a);
 else body=vWrite(q,a);

   <div class="steps">${stepTags}</div></div>
 <section class="sheet"><span class="sheet-label">${esc(session.label)}</span>
   <div class="train-sheet">${body}</div></section>`}
function isMixed(q){return!!(session&&session.mixed&&session.mixed[q.id])}

  <span class="gold">${['c','m','w'].map(k=>s&&s.keys[k]?"◆":"◇").join(" ")} KEYS</span></div>`}

/* --- お手本タイピング --- */
function vCopy(q,a){
 const t=q.en,inp=a.cur||"",matched=(()=>{let n=0;while(n<inp.length&&n<t.length&&inp[n]===t[n])n++;return n})();
 const bad=inp.length>matched;
 return`${metaHtml(q)}
 <div class="q-en en" aria-label="お手本">${esc(t.slice(0,matched))?`<span class="hit">${esc(t.slice(0,matched))}</span>`:""}${bad?`<span class="miss">${esc(t.slice(matched,matched+1))}</span><span class="rest">${esc(t.slice(matched+1))}</span>`:`<span class="rest">${esc(t.slice(matched))}</span>`}</div>
 ${S.set.showJa?`<div class="q-ja">${esc(q.ja)}</div>`:""}
 <div class="type-line"><input id="ti" autocomplete="off" autocapitalize="off" spellcheck="false"
   placeholder="お手本を見ながら、そのまま打とう" value="${esc(inp)}" aria-label="入力欄"></div>
 <div class="type-stats">
   <span>ミス <b>${a.err}</b></span><span>Backspace <b>${a.bs}</b></span>
   <span>${a.t0?`経過 <b>${Math.round((Date.now()-a.t0)/1000)}</b> 秒`:"タイプすると計測開始"}</span>
 </div>`}
function bindCopy(q,a){const ti=$("#ti");if(!ti)return;ti.focus();
 try{ti.setSelectionRange(ti.value.length,ti.value.length)}catch(e){}
 ti.onkeydown=e=>{if(e.key==="Backspace")a.bs++};
 ti.oninput=()=>{if(!a.t0)a.t0=Date.now();
  const v=ti.value;
  if(v.length>a.prevLen){a.total++;if(!q.en.startsWith(normSp(v))&&!q.en.startsWith(v))a.err++}
  a.prevLen=v.length;a.cur=v;
  if(normSp(v)===normSp(q.en)){finishCopy(q,a)}else render()}}
function finishCopy(q,a){
 const sec=(Date.now()-a.t0)/1000;
 a.acc=a.total?Math.max(0,Math.round((a.total-a.err)/a.total*100)):100;
 a.wpm=sec>1?Math.min(250,Math.round(q.words.length/(sec/60))):0;a.sec=Math.round(sec);
 a.done=true;a.result="copy";
 const d=day();d.sent++;d.accS+=a.acc;d.accN++;d.wpmS+=a.wpm;d.wpmN++;d.sec+=a.sec;if(a.acc>=100)d.perfect++;
 if(session.review){d.rev++}
 a.keyNew=giveKey(q,"c");sfx(a.keyNew?"key":"ok");touchStreak();
 logResult({qid:q.id,level:q.level,mode:"copy",result:"ok",input:q.en,answer:q.en,duration:a.sec,accuracy:a.acc,wpm:a.wpm,errType:"",hintLevel:0,confidence:"",});

/* --- ステップ --- */
function stepPrompt(q,step){
 if(step===1)return{en:q.en,ja:q.ja};
 if(step===2){const w=q.words.map((w,i)=>i%2===1?w.replace(/[A-Za-z]/g,"_"):w);return{en:w.join(" ")+q.punct,ja:q.ja}}
 if(step===3)return{en:q.firstLetter,ja:q.ja};
 return{en:"",ja:q.ja}}
function vStep(q,a){const p=stepPrompt(q,a.step);
 return`${metaHtml(q)}
 ${p.en?`<div class="q-en en">${esc(p.en)}</div>`:""}
 <div class="q-ja ${p.en?"":"big"}">${esc(q.ja)}</div>
 <div class="type-line"><input id="ti" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="${a.step===4?"日本語だけを見て、英文を打とう":"英文を打とう"}" aria-label="入力欄"></div>
 <div id="fbArea">${a.fb||""}</div>
 <div class="train-nav">
   <button class="btn-ghost" id="btnSkipQ">この文をとばす</button>
   <button class="btn-primary" id="btnCheck">${ICONS.check} 確認する</button>
 </div>`}
function bindStep(q,a){const ti=$("#ti");if(ti){ti.focus();ti.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();$("#btnCheck").click()}}}
 $("#btnCheck").onclick=()=>{const r=judge(ti.value,q,false);a.tries++;
  if(r.ok){
    if(a.step<4){a.fb=fbHtml(r,q,`Step ${a.step} クリア!`);a.step++;a.fb+="";render()}
    else{a.done=true;a.result="step";
      const d=day();d.sent++;d.self++;if(session.review)d.rev++;
      const k1=giveKey(q,"c"),k2=giveKey(q,"m"),k3=giveKey(q,"w");a.keyNew=k1||k2||k3;sfx(a.keyNew?"key":"ok");touchStreak();
      logResult({qid:q.id,level:q.level,mode:"step",result:"ok",input:normSp(ti.value),answer:q.en,duration:0,accuracy:"",wpm:"",errType:"",hintLevel:a.step-1,confidence:""});
      checkBadges({review:session.review,retry:a.retry,tries:a.tries,ok:true,noHint:false,hinted:true});
      save();render();speak(q.en)}}
  else{a.fb=fbHtml(r,q);render()}};
 $("#btnSkipQ").onclick=()=>{scheduleAndNext(q,a,"wrong",true)}}

/* --- 語順 --- */
function vOrder(q,a){
 if(!a.shuffled){a.shuffled=shuffle(q.words.map((w,i)=>({w,i})));a.usedIdx=[]}
 if(a.phase===1)return vCopyPhase(q,a);

  <div class="order-bank">${a.shuffled.map((o,i)=>`<button class="w-chip ${a.usedIdx.includes(i)?'used':''}" data-c="${i}">${esc(o.w)}<span class="kbd">${i+1}</span></button>`).join("")}</div>

 if(a.phase===1){const ti=$("#ti");if(ti){ti.focus();ti.oninput=()=>{

 document.querySelectorAll("[data-c]").forEach(b=>b.onclick=()=>{

function saveCbtInput(){const ti=$("#ti");if(ti&&cbt&&!cbt.submitted)cbt.ans[cbt.list[cbt.idx].id]=ti.value}
function bindCbt(){
 if(cbt.submitted){bindCbtResult();return}
 const sheet=document.querySelector(".cbt-noselect");
 if(sheet){["copy","paste","cut"].forEach(ev=>sheet.addEventListener(ev,e=>e.preventDefault()));
   sheet.addEventListener("selectstart",e=>{if(e.target.id!=="ti")e.preventDefault()})}
 const ti=$("#ti");if(ti){ti.focus();["paste","copy","cut","drop"].forEach(ev=>ti.addEventListener(ev,e=>e.preventDefault()))}
 document.querySelectorAll("[data-p]").forEach(b=>b.onclick=()=>{saveCbtInput();cbt.idx=Number(b.dataset.p);cbt.confirm=false;render()});
 const pv=$("#btnPrev");if(pv)pv.onclick=()=>{saveCbtInput();cbt.idx--;render()};
 const nx=$("#btnNextC");if(nx)nx.onclick=()=>{saveCbtInput();cbt.idx++;render()};
 $("#btnFlag").onclick=()=>{saveCbtInput();const id=cbt.list[cbt.idx].id;cbt.flag[id]=!cbt.flag[id];cbt.usedFlag=true;render()};
 $("#btnSubmit").onclick=()=>{saveCbtInput();cbt.confirm=true;render()};
 const cs=$("#btnCancelSub");if(cs)cs.onclick=()=>{cbt.confirm=false;render()};
 const ds=$("#btnDoSub");if(ds)ds.onclick=()=>submitCbt(false)}
function submitCbt(timeup){saveCbtInput();clearInterval(cbt.timer);
 cbt.res=cbt.list.map(q=>{const inp=cbt.ans[q.id]||"";const r=judge(inp,q,true);
   if(!r.perfect&&!(r.issues.length===0))schedule(q,"wrong");else if(r.perfect)schedule(q,"self");
   logResult({qid:q.id,level:q.level,mode:"cbt",result:r.perfect?"ok":"ng",input:normSp(inp),answer:q.en,duration:0,accuracy:"",wpm:"",errType:r.issues.join(";"),hintLevel:0,confidence:""});
   return{q,inp,ok:r.perfect,msgs:r.msgs}});
 cbt.timeup=timeup;cbt.submitted=true;
 const okN=cbt.res.filter(r=>r.ok).length,rate=Math.round(okN/cbt.res.length*100);
 const d=day();d.sent+=okN;touchStreak();
 checkBadges({cbt:true,cbtRate:rate,cbtFlag:cbt.usedFlag});save();render()}

 document.querySelectorAll("[data-pm]").forEach(b=>b.onclick=()=>{editingPhrase=list[b.dataset.pm].id;render();

 const mv=document.querySelector("[data-mv]");if(mv){
  const doSave=()=>{const p=S.phrases.find(x=>x.id===editingPhrase);const v=normSp($("#mineInput").value);

  mv.onclick=doSave;

  <div class="set-row"><span class="lbl">効果音<small>正解・鍵・宝箱の小さな音。周りが気になるときはオフに</small></span>${togBtn("sfx",s.sfx)}</div>
  <div class="set-row"><span class="lbl">読み上げ速度</span>
   <span class="seg">${segBtn("rate","0.8","ゆっくり",s.rate)}${segBtn("rate","0.95","ふつう",s.rate)}${segBtn("rate","1.1","速い",s.rate)}</span></div>
 </div>
 <h2 class="sec">Learning</h2>
 <div class="set-card">
  <div class="set-row"><span class="lbl">出題する範囲<small>ホームのタイピング・英作文・ミッションのランダム出題を、この学年までにします</small></span>
   <span class="seg">${segBtn("grade","1","1年まで",s.grade)}${segBtn("grade","2","2年まで",s.grade)}${segBtn("grade","0","ぜんぶ",s.grade)}</span></div>
  <div class="set-row"><span class="lbl">回答後の自信度をきく<small>「当てずっぽう」なら翌日また出題、「自信あり」なら間をあけて出題。復習のタイミング調整に使います</small></span>${togBtn("conf",s.conf)}</div>
  <div class="set-row"><span class="lbl">ニックネーム(CSVに記録・端末内のみ)<small>本名は入れないでください</small></span>
   <input type="text" id="setNick" maxlength="12" value="${esc(s.nick)}" style="width:8rem"></div>
 </div>
 <h2 class="sec">Data</h2>
 <div class="set-card" style="padding:.8rem .9rem">${dataActionsHtml()}</div>
 <h2 class="sec">Teacher</h2>
 <div class="set-card">
  ${teacherOpen?`
  <div class="set-row"><span class="lbl">ヒントを許可</span>${togBtn("hints",s.hints)}</div>
  <div class="set-row"><span class="lbl">英作文でも大文字・記号を厳格に採点<small>オフのときは内容が合っていれば正解+直すポイント表示</small></span>${togBtn("strictCase",s.strictCase)}</div>
  <div class="set-row"><span class="lbl">CBTの標準問題数</span>
   <span class="seg">${segBtn("cbtN","5","5",s.cbtN)}${segBtn("cbtN","10","10",s.cbtN)}${segBtn("cbtN","20","20",s.cbtN)}</span></div>
  <div class="set-row"><span class="lbl">CBTの標準時間(分)</span>
   <span class="seg">${segBtn("cbtMin","5","5",s.cbtMin)}${segBtn("cbtMin","10","10",s.cbtMin)}${segBtn("cbtMin","15","15",s.cbtMin)}</span></div>
  <div class="data-actions" style="margin:.2rem 0 .4rem">
   <button id="btnQCsv">問題データを書き出す(CSV)</button>
   <button class="danger" id="btnResetHist">学習履歴だけ初期化</button></div>
  <div class="set-row"><span class="lbl">パスコードの変更<small>4〜12文字・この端末にのみ保存</small></span>
   <input type="password" id="newPass" style="width:7rem" placeholder="新しいパスコード" autocomplete="off">
   <button class="btn-aid" id="btnChgPass" style="background:transparent">変更</button></div>
  <p class="empty" style="padding:.4rem 0">※このパスコードは簡易的なもので、安全な認証機能ではありません。忘れた場合は「データを全部消す」で初期値にもどります。</p>`
  :`<div class="set-row"><span class="lbl">先生向け設定<small>パスコードを入力</small></span>
   <input type="password" id="tPass" style="width:6rem" placeholder="****" autocomplete="off">
   <button class="btn-aid" id="btnTeacher" style="background:transparent">ひらく</button></div>`}
 </div>
 <p class="empty">KEYSは外部サーバーやAIを使いません。入力内容はこの端末の中にだけ保存されます。</p>`}
function bindSettings(){
 document.querySelectorAll("[data-set]").forEach(b=>b.onclick=()=>{const k=b.dataset.set;let v=b.dataset.val;
  if(k==="fs"||k==="cbtN"||k==="cbtMin"||k==="grade")v=Number(v);if(k==="rate")v=Number(v);
  S.set[k]=v;save();applySettings();render()});
 document.querySelectorAll("[data-tg]").forEach(b=>b.onclick=()=>{const k=b.dataset.tg;
  if(k==="motionOff")S.set.motion=!S.set.motion;else S.set[k]=!S.set[k];
  save();applySettings();render()});
 const nk=$("#setNick");if(nk)nk.onchange=()=>{S.set.nick=normSp(nk.value).slice(0,12);save()};
 bindDataActions();
 const qc=$("#btnQCsv");if(qc)qc.onclick=()=>{
  const head="id,level,unit,japanese,answer,alternativeAnswers,typingText,wordBlocks,sentencePattern,explanation";
  const rows=Q.map(q=>[q.id,q.level,q.unit,q.ja,q.en,q.answers.slice(1).join("|"),q.en,q.words.join("/"),q.pat,q.exp].map(csvCell).join(","));
  dl("keys-questions.csv","\uFEFF"+[head,...rows].join("\n"),"text/csv")};
 const rh=$("#btnResetHist");if(rh)rh.onclick=()=>{if(confirm("学習履歴(鍵・バッジ・記録)を初期化します。設定は残ります。よろしいですか?")){
   const set=S.set;S=structuredClone(DEFAULTS);S.set=set;save();render();alert("学習履歴を初期化しました(設定は残っています)")}};
 const bt=$("#btnTeacher");if(bt)bt.onclick=()=>{
  if($("#tPass").value===(S.set.tpass||"7777")){teacherOpen=true;render()}else alert("パスコードが違います")}
 const cp=$("#btnChgPass");if(cp)cp.onclick=()=>{
  const v=normSp($("#newPass").value);
  if(v.length<4||v.length>12){alert("パスコードは4〜12文字で設定してください");return}
  S.set.tpass=v;save();$("#newPass").value="";alert("パスコードを変更しました(この端末にのみ保存されます)")}}
function applySettings(){
 document.documentElement.style.setProperty("--fs",S.set.fs+"px");
 document.body.dataset.colors=S.set.colors;
 document.body.classList.toggle("reduce-motion",!S.set.motion)}

/* ---------- レンダリング ---------- */
function render(){
 renderHeader();
 const app=$("#app");
 if(view==="session"&&session){app.innerHTML=vSession();
   $("#btnQuit").onclick=()=>{if(confirm("練習を中断しますか?(つづきから再開できます)"))nav("home")};
   const q=curQ(),a=session.att;
   if(a.done)bindDone(q,a);
   else if(session.mode==="copy")bindCopy(q,a);
   else if(session.mode==="step")bindStep(q,a);
   else if(session.mode==="order")bindOrder(q,a);
   else bindWrite(q,a);
   return}
 if(view==="cbtSetup"){app.innerHTML=vCbtSetup();bindCbtSetup();return}
 if(view==="cbt"&&cbt){app.innerHTML=vCbt();bindCbt();return}
 if(view==="map"){app.innerHTML=vMap();bindMap();return}
 if(view==="records"){app.innerHTML=vRecords();bindRecords();return}
 if(view==="print"){app.innerHTML=vPrint();bindPrint();return}
 if(view==="settings"){app.innerHTML=vSettings();bindSettings();return}
 view="home";app.innerHTML=vHome();bindHome()}

/* ---------- 簡易テスト(開発用: コンソールで runTests() ) ---------- */
function runTests(){
 const q=Q.find(x=>x.en==="I can run fast.");
 const t=[,
  [judge("I can run fast.",q,false).perfect,true,"完全一致"],
  [judge("i can run fast",q,false).ok,true,"練習モード:内容一致は正解"],
  [judge("i can run fast",q,true).ok,false,"テストモード:大文字・記号で不正解"],
  [judge("I can run fast.",QBY[q.id],true).perfect,true,"strict完全一致"],
  [judge("fast can run I.",q,false).issues.includes("order"),true,"語順違い検出"],
  [judge("I can ran fast.",q,false).issues.includes("spell"),true,"スペル/活用検出"],
  [judge("I can run.",q,false).issues.includes("missing"),true,"単語不足検出"],
  [judge("  I   can run fast. ",q,false).perfect,true,"連続空白・前後空白"],
  [judge("I can\u2019t swim well.",Q.find(x=>x.en==="I can't swim well."),false).perfect,true,"スマートアポストロフィ"],
  [judge("I cannot swim well.",Q.find(x=>x.en==="I can't swim well."),false).perfect,true,"短縮形⇔非短縮形"],
  [judge("I am going to visit him this weekend.",Q.find(x=>x.en==="I'm going to visit him this weekend."),false).perfect,true,"I'm⇔I am"],
  [judge("Are you from the U.S.",Q.find(x=>x.en==="Are you from the U.S.?"),false).issues.includes("qmark"),true,"疑問符不足"],
  [judge("My father has a bike made in France.",Q.find(x=>x.en==="My father has a bicycle made in France."),false).perfect,true,"同義語 bike⇔bicycle"],
  [judge("My father has a bike made in France.",Q.find(x=>x.en==="My father has a bicycle made in France."),true).perfect,true,"CBTでも同義語OK"],
  [judge("You are from America.",Q.find(x=>x.en==="You are from the U.S."),false).perfect,true,"the U.S.⇔America"],
  [judge("Are you from the USA?",Q.find(x=>x.en==="Are you from the U.S.?"),true).perfect,true,"the U.S.⇔USA (CBT)"],
 ].filter(Boolean);
 let ok=0;t.forEach(([got,want,name])=>{const p=got===want;if(p)ok++;console[p?"log":"error"](`${p?"✔":"✘"} ${name}`,p?"":`got=${got}`)});
 console.log(`${ok}/${t.length} passed`);return ok===t.length}

/* ---------- 起動 ---------- */
function init(){load();applySettings();
 window.addEventListener("storage",e=>{if(e.key===SKEY){load();applySettings();if(view!=="session"&&view!=="cbt")render()}});
 if(canSpeak)try{speechSynthesis.getVoices()}catch(e){}
 render()}
if(typeof document!=="undefined"&&document.getElementById("app"))init();
if(typeof globalThis!=="undefined")globalThis.runTests=runTests;
</script>
</body>
</html>
